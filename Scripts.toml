
[global_env]

[scripts]
dev = "cargo run"
build = { command = "cargo build", env = { RUST_LOG = "info" } }
release = "cargo build --release"
install = "cargo install --path . --locked --force"
test = { command = "cargo test --all-features", env = { RUST_LOG = "warn" } }
doc = "cargo doc --no-deps --open"

# ---------------------------------------------------------------------------
# Windows installer (MSI) — produces target/wix/Keyhop-<version>-x86_64.msi
#
# `cargo wix` shells out to candle.exe / light.exe from the WiX Toolset 3.
# Those binaries are *not* on PATH on a default Windows install. The
# wrapper below probes the well-known locations (the WIX env var that
# the WiX MSI sets, scoop, and Program Files) and prepends the first
# match to PATH for the duration of the script.
#
# Prerequisites once per machine:
#   scoop install wixtoolset3
#   cargo install --locked cargo-wix --version "^0.3"
#
# Usage:
#   cargo script msi          # full build: release exe + MSI
#   cargo script msi-only     # just the MSI (assumes target/release/keyhop.exe exists)
#   cargo script msi-clean    # wipe target/wix
#   cargo script msi-show     # print the produced MSI's path + size
# ---------------------------------------------------------------------------

[scripts.msi]
interpreter = "powershell"
info = "Build keyhop.exe + Windows MSI installer for distribution"
command = """
$ErrorActionPreference = 'Stop'
if (-not (Get-Command candle.exe -ErrorAction SilentlyContinue)) {
    $candidates = @(
        "$env:WIX\\bin",
        "$env:USERPROFILE\\scoop\\apps\\wixtoolset3\\current",
        "${env:ProgramFiles(x86)}\\WiX Toolset v3.14\\bin",
        "${env:ProgramFiles(x86)}\\WiX Toolset v3.11\\bin"
    )
    $wix = $candidates | Where-Object { $_ -and (Test-Path "$_\\candle.exe") } | Select-Object -First 1
    if (-not $wix) {
        throw "WiX Toolset 3 not found. Install with: scoop install wixtoolset3"
    }
    $env:PATH = "$wix;$env:PATH"
}
cargo build --release --locked
if ($LASTEXITCODE -ne 0) { throw "cargo build failed" }
cargo wix --no-build --nocapture
if ($LASTEXITCODE -ne 0) { throw "cargo wix failed" }
$msi = Get-ChildItem -Path target/wix -Filter "Keyhop-*-x86_64.msi" | Select-Object -First 1
if ($msi) {
    Write-Host ""
    Write-Host "MSI: $($msi.FullName) ($([math]::Round($msi.Length / 1MB, 2)) MB)"
}
"""

[scripts.msi-only]
interpreter = "powershell"
info = "Build only the MSI (assumes target/release/keyhop.exe is up to date)"
command = """
$ErrorActionPreference = 'Stop'
if (-not (Get-Command candle.exe -ErrorAction SilentlyContinue)) {
    $candidates = @(
        "$env:WIX\\bin",
        "$env:USERPROFILE\\scoop\\apps\\wixtoolset3\\current",
        "${env:ProgramFiles(x86)}\\WiX Toolset v3.14\\bin",
        "${env:ProgramFiles(x86)}\\WiX Toolset v3.11\\bin"
    )
    $wix = $candidates | Where-Object { $_ -and (Test-Path "$_\\candle.exe") } | Select-Object -First 1
    if (-not $wix) {
        throw "WiX Toolset 3 not found. Install with: scoop install wixtoolset3"
    }
    $env:PATH = "$wix;$env:PATH"
}
if (-not (Test-Path "target/release/keyhop.exe")) {
    throw "target/release/keyhop.exe not found. Run 'cargo script release' first, or use 'cargo script msi'."
}
cargo wix --no-build --nocapture
"""

[scripts.msi-clean]
interpreter = "powershell"
info = "Remove target/wix so the next msi build starts clean"
command = "if (Test-Path target/wix) { Remove-Item -Recurse -Force target/wix; Write-Host 'Removed target/wix' } else { Write-Host 'target/wix already clean' }"

[scripts.msi-show]
interpreter = "powershell"
info = "List the MSI(s) under target/wix"
command = """
if (-not (Test-Path target/wix)) { Write-Host 'No target/wix yet. Run: cargo script msi'; exit 0 }
Get-ChildItem -Path target/wix -Filter "*.msi" | ForEach-Object {
    "{0,-40} {1,8:N2} MB   {2}" -f $_.Name, ($_.Length / 1MB), $_.LastWriteTime
}
"""

# ---------------------------------------------------------------------------
# get_url — resolve a stable github.com asset URL to its current signed URL
#
# Takes a permanent GitHub release-asset URL of the form
#   https://github.com/<owner>/<repo>/releases/download/<tag>/<asset>
# and prints the *current* signed `release-assets.githubusercontent.com/...`
# URL that GitHub 302-redirects to. The signed URL is short-lived (~5 min)
# and is what GitHub serves the bytes from, so it's mostly useful for:
#   - pasting into forms that pre-resolve the redirect (Microsoft Partner
#     Center's Package URL field shows this expanded form)
#   - debugging download failures (you can inspect the SAS expiry)
#   - sanity-checking that an asset actually exists before publishing
#
# DO NOT submit the resolved URL anywhere that needs to keep working
# longer than ~5 minutes — the signature expires. Submit the original
# `github.com/.../releases/download/...` URL for any long-lived
# integration (Store submissions, README badges, package manifests).
#
# `cargo script` doesn't forward positional args after the script name —
# only env vars via `--env KEY=VALUE`. We read the URL from `$env:URL`,
# with `$env:KEYHOP_RELEASE_URL` as a fallback for the common case of
# resolving the latest keyhop MSI.
#
# Uses `curl.exe` (not PowerShell's `curl` alias for Invoke-WebRequest)
# so the `-sI` head-only request actually returns the redirect headers.
# Windows 10 1803+ and Windows 11 ship curl.exe by default.
#
# Usage:
#   cargo script get_url --env URL=<github-release-asset-url>
#
# Examples:
#   cargo script get_url --env URL=https://github.com/rsaz/keyhop/releases/download/v0.3.0/Keyhop-0.3.0-x86_64.msi
#   cargo script get_url --env URL=https://github.com/rsaz/keyhop/releases/download/v0.3.0/keyhop.exe
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# verify-r2 — confirm the MSI mirrored to Cloudflare R2 matches GitHub Releases
#
# We publish the same MSI bytes through two channels: GitHub Releases (the
# source of truth, written by `release.yml`) and Cloudflare R2 (the URL
# pasted into Microsoft Partner Center, currently uploaded by hand). This
# script downloads the MSI from both URLs and SHA256-compares them.
#
# A mismatch means one of two things:
#   1. The R2 upload was corrupted or partial — re-upload via the
#      Cloudflare dashboard at:
#        keyhop / release / v<version> /
#      (see RELEASE_PROCESS.md § 2 for the click-by-click).
#   2. Someone uploaded the wrong file to R2 (e.g. an older version).
#      Same fix.
#
# Runs without any credentials — both URLs are public.
#
# Usage:
#   cargo script verify-r2 --env VERSION=0.3.0
#
# Optional overrides (defaults match keyhop's current setup):
#   --env GH_OWNER=rsaz       (GitHub repo owner)
#   --env GH_REPO=keyhop      (GitHub repo name)
#   --env R2_BASE=https://dl.expresso-ts.com/release   (R2 public base URL)
# ---------------------------------------------------------------------------

[scripts.verify-r2]
interpreter = "powershell"
info = "Compare the SHA256 of the MSI on GitHub Releases vs Cloudflare R2 (--env VERSION=0.3.0)"
command = """
$ErrorActionPreference = 'Stop'
$version = $env:VERSION
if (-not $version) {
    Write-Host "Usage: cargo script verify-r2 --env VERSION=<x.y.z>"
    Write-Host "Example: cargo script verify-r2 --env VERSION=0.3.0"
    exit 0
}
$ghOwner = if ($env:GH_OWNER) { $env:GH_OWNER } else { 'rsaz' }
$ghRepo  = if ($env:GH_REPO)  { $env:GH_REPO }  else { 'keyhop' }
$r2Base  = if ($env:R2_BASE)  { $env:R2_BASE }  else { 'https://dl.expresso-ts.com/release' }
$file    = "Keyhop-$version-x86_64.msi"
$ghUrl   = "https://github.com/$ghOwner/$ghRepo/releases/download/v$version/$file"
$r2Url   = "$r2Base/v$version/$file"
$ghTmp   = Join-Path $env:TEMP "verify-r2-gh.msi"
$r2Tmp   = Join-Path $env:TEMP "verify-r2-r2.msi"
Write-Host "GitHub: $ghUrl"
Write-Host "R2    : $r2Url"
Write-Host ""
Write-Host "--- downloading both ---"
curl.exe -sL --fail -o $ghTmp $ghUrl
if ($LASTEXITCODE -ne 0) { throw "GitHub download failed (exit $LASTEXITCODE). Is v$version published?" }
curl.exe -sL --fail -o $r2Tmp $r2Url
if ($LASTEXITCODE -ne 0) { throw "R2 download failed (exit $LASTEXITCODE). Did you upload the MSI to release/v$version/ ?" }
function Get-Sha256Hex([string]$path) {
    $bytes = [System.IO.File]::ReadAllBytes($path)
    $sha = [System.Security.Cryptography.SHA256]::Create()
    try { return ([BitConverter]::ToString($sha.ComputeHash($bytes))).Replace('-', '').ToUpper() }
    finally { $sha.Dispose() }
}
$ghHash = Get-Sha256Hex $ghTmp
$r2Hash = Get-Sha256Hex $r2Tmp
$ghSize = (Get-Item $ghTmp).Length
$r2Size = (Get-Item $r2Tmp).Length
Write-Host ""
Write-Host "--- comparison ---"
Write-Host ("GitHub: {0}  ({1:N0} bytes)" -f $ghHash, $ghSize)
Write-Host ("R2    : {0}  ({1:N0} bytes)" -f $r2Hash, $r2Size)
Write-Host ""
if ($ghHash -eq $r2Hash) {
    Write-Host "Match : OK -- safe to submit $r2Url to Partner Center." -ForegroundColor Green
    exit 0
} else {
    Write-Host "Match : MISMATCH -- DO NOT submit. Re-upload the MSI to R2 (see RELEASE_PROCESS.md section 2)." -ForegroundColor Red
    exit 1
}
"""

[scripts.get_url]
interpreter = "powershell"
info = "Resolve a github.com release-asset URL to its current signed download URL (--env URL=...)"
command = """
$ErrorActionPreference = 'Stop'
$url = if ($env:URL) { $env:URL } elseif ($env:KEYHOP_RELEASE_URL) { $env:KEYHOP_RELEASE_URL } else { $null }
if (-not $url) {
    # Exit 0 (not 1) so cargo-script doesn't suppress stdout — it
    # currently hides script Write-Host output on non-zero exits and
    # prints the script body instead, which makes a "missing arg" diag
    # look like a syntax error.
    Write-Host "Usage: cargo script get_url --env URL=<github-release-asset-url>"
    Write-Host ""
    Write-Host "Example:"
    Write-Host "  cargo script get_url --env URL=https://github.com/rsaz/keyhop/releases/download/v0.3.0/Keyhop-0.3.0-x86_64.msi"
    exit 0
}
if ($url -notmatch '^https?://') {
    throw "Not a URL: '$url'"
}
$location = curl.exe -sI $url |
    Select-String -Pattern '^location:' |
    ForEach-Object { ($_ -split ' ', 2)[1].Trim() } |
    Select-Object -Last 1
if (-not $location) {
    throw "No 'location:' header in response from $url - not a redirecting asset URL, or the asset doesn't exist."
}
Write-Host $location
"""
